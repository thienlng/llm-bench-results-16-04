# nginx-domain.conf — Add to the server block for netmind.viettel.vn
#
# This handles the external-facing URL /report/llm-bench-h200/
# and proxies to the wrapper nginx on port 8089.
#
# Flow:  browser → domain nginx (:443/:80) → wrapper nginx (:8089) → container (:8000)
#        /report/llm-bench-h200/*     /report/llm-bench-h200/*        /*

# Redirect bare path (no trailing slash) to path with slash
location = /report/llm-bench-h200 {
    return 308 /report/llm-bench-h200/;
}

# Proxy all requests under /report/llm-bench-h200/ to the wrapper nginx
location /report/llm-bench-h200/ {
    proxy_pass http://10.207.163.17:8089/report/llm-bench-h200/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}