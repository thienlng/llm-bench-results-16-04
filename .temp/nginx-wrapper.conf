# nginx-wrapper.conf — runs on port 8089
# Place in /etc/nginx/conf.d/ or /etc/nginx/sites-available/
#
# This nginx sits between the domain-level nginx (netmind.viettel.vn)
# and the Docker container. The domain nginx proxies /report/llm-bench-h200/
# to this wrapper on port 8089, which then proxies to the container on port 8000.
#
# Flow:  browser → domain nginx (:443) → wrapper nginx (:8089) → container (:8000)
#        /report/llm-bench-h200/         /report/llm-bench-h200/        /

server {
    listen 8089;

    # /report/llm-bench-h200/ — matches the <base href> in index.html
    # Strips the /report/llm-bench-h200/ prefix before forwarding to container
    location /report/llm-bench-h200/ {
        proxy_pass http://thienln4-report-llm-bench-h200:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}