server {
    listen 8000;
    server_name _;

    absolute_redirect off;
    rewrite_log on;

    root /usr/share/nginx/html;
    index index.html;

    location /report/llm-bench-h200 {
        return 301 /report/llm-bench-h200/;
    }

    location /report/llm-bench-h200/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /report/llm-bench-h200/index.html;

        location ~* \.(js|json|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}